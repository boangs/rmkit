name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell:
    name: shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n syntax
        run: |
          set -euo pipefail
          for f in installer/install.sh installer/uninstall.sh; do
            echo "==> $f"; bash -n "$f"
          done
          for f in scripts/*.sh; do
            echo "==> $f"; bash -n "$f"
          done
          if [ -f vendor/xovi/xochitl-xovi ]; then
            echo "==> vendor/xovi/xochitl-xovi"
            bash -n vendor/xovi/xochitl-xovi
          fi

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC2029 -e SC2087 -e SC2086
        with:
          severity: error
          ignore_paths: vendor qml-dump qmd qmd-src tools/hashtabs dist

  python:
    name: python helper syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: py_compile (开发辅助脚本, 不再含 hash-qmd / qmd_hash_check)
        run: |
          set -euo pipefail
          python -m py_compile scripts/merge_ts.py
          python -m py_compile scripts/translate_ts.py

  qmd-tool:
    name: qmd-tool (Go) — hash-qmd + check 的重写
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/qmd-tool/go.mod
          cache-dependency-path: tools/qmd-tool/go.mod

      - name: vet + test
        working-directory: tools/qmd-tool
        run: |
          go vet ./...
          go test ./...

      - name: build host (用于 check) + cross-compile aarch64/armv7
        working-directory: tools/qmd-tool
        run: |
          go build -trimpath -ldflags='-s -w' -o /tmp/qmd-tool .
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags='-s -w' -o /tmp/qmd-tool-aarch64 .
          GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags='-s -w' -o /tmp/qmd-tool-armv7 .

      - name: validate qmd hashes against hashtabs (替代旧 python qmd_hash_check.py)
        run: /tmp/qmd-tool check

  go-ime:
    name: go IME daemon
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ime-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ime-go/go.mod
          cache-dependency-path: ime-go/go.sum

      - run: go vet ./...
      - run: go test ./...

      - name: cross-compile aarch64
        run: |
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags='-s -w' \
            -o /tmp/ime-server-aarch64 ./cmd/ime-server
      - name: cross-compile armv7
        run: |
          GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags='-s -w' \
            -o /tmp/ime-server-armv7 ./cmd/ime-server

  go-upload:
    name: go upload-server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: upload-server-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: upload-server-go/go.mod
          cache-dependency-path: upload-server-go/go.sum

      - run: go vet ./...
      - run: go test ./...

      - name: cross-compile aarch64
        run: |
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags='-s -w' \
            -o /tmp/upload-server-aarch64 ./cmd/upload-server
      - name: cross-compile armv7
        run: |
          GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags='-s -w' \
            -o /tmp/upload-server-armv7 ./cmd/upload-server
